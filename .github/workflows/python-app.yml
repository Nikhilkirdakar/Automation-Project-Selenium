name: Python Selenium Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.10', '3.11' ]
        browser: [ 'chrome', 'firefox' ]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          pytest -q --headless --browser_name=${{ matrix.browser }} --junitxml=Reports/results-${{ matrix.browser }}.xml --html=Reports/report-${{ matrix.browser }}.html --self-contained-html
      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.browser }}
          path: Reports/
